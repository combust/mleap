  python312-tests:
    name: Python 3.12 tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build devcontainer image
        uses: docker/build-push-action@v5
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          push: false
          load: true
          tags: mleap:ci
      
      - name: Run Python 3.12 tests
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            --user root mleap:ci make test_python_312

  ci-completion:
    runs-on: ubuntu-latest
    needs: [mleap-executor-tests, mleap-benchmark-tests, mleap-sbt-tests, python37-tests, python38-tests, python39-tests, python310-tests, python311-tests, python312-tests]
    if: always() # Required so this runs even if a dependency fails
    steps:
      - name: Check overall status
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  publish:
    name: Publish signed jars
    runs-on: ubuntu-latest
    needs: [ci-completion]
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build devcontainer image
        uses: docker/build-push-action@v5
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          push: false
          load: true
          tags: mleap:ci
      
      - name: Publish signed jars
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace \
            --user root \
            -e SONATYPE_USERNAME="$SONATYPE_USERNAME" \
            -e SONATYPE_PASSWORD="$SONATYPE_PASSWORD" \
            -e GPG_PASSPHRASE="$GPG_PASSPHRASE" \
            -e GPG_SECRET_KEY="$GPG_SECRET_KEY" \
            -e TWINE_USERNAME="$TWINE_USERNAME" \
            -e TWINE_PASSWORD="$TWINE_PASSWORD" \
            mleap:ci bash sbt publishSigned
